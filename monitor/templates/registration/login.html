<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Monitoring System | Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Inter',sans-serif;
        }

        body{

            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;

            background:linear-gradient(135deg,#eef2ff,#f8fafc);
        }

        .login-card{

            width:420px;
            background:#fff;
            border-radius:22px;
            padding:40px;
            box-shadow:0 20px 45px rgba(0,0,0,.08);
            position:relative;

        }


        .logo{

            width:60px;
            height:60px;
            border-radius:18px;
            background:linear-gradient(135deg,#7C3AED,#A855F7);
            display:flex;
            align-items:center;
            justify-content:center;
            margin:0 auto 18px;
            box-shadow:0 10px 25px rgba(124,58,237,.35);

        }

        .logo i{

            color:#fff;
            font-size:26px;

        }

        h2{

            text-align:center;
            font-weight:700;
            margin-bottom:30px;
            color:#1e293b;

        }

        .form-label{

            font-weight:600;
            color:#334155;

        }

        .form-control{

            border-radius:12px;
            padding:12px;
            border:1px solid #dbe4ee;

        }

        .form-control:focus{

            border-color:#7C3AED;
            box-shadow:0 0 0 .2rem rgba(124,58,237,.15);

        }

        .btn-login{

            width:100%;
            background:linear-gradient(135deg,#7C3AED,#9333EA);
            color:white;
            border:none;
            border-radius:12px;
            padding:13px;
            font-weight:600;
            margin-top:10px;

        }

        .btn-login:hover{

            color:white;
            transform:translateY(-2px);
            box-shadow:0 10px 20px rgba(124,58,237,.3);

        }

        .error-box{

            background:#FEE2E2;
            color:#DC2626;
            padding:12px;
            border-radius:10px;
            margin-bottom:20px;
            font-size:14px;

        }

        .bottom-text{

            text-align:center;
            margin-top:25px;
            color:#64748b;
            font-size:14px;

        }

    </style>

</head>

<body>

<div class="login-card">

    <!-- Logo -->

    <div class="logo">

        <i class="bi bi-shield-check"></i>

    </div>

    <h2>Login</h2>

    <form method="POST">

        {% csrf_token %}

        {% if form.non_field_errors %}

        <div class="error-box">

            {{ form.non_field_errors }}

        </div>

        {% endif %}

        <div class="mb-3">

            <label class="form-label">

                Username

            </label>

            <input
                type="text"
                name="username"
                class="form-control"
                placeholder="Enter your username"
                required>

        </div>

        <div class="mb-4">

            <label class="form-label">

                Password

            </label>

            <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Enter your password"
                required>

        </div>

        <button type="submit" class="btn btn-login">

            <i class="bi bi-box-arrow-in-right"></i>

            Login

        </button>

    </form>

    </div>

</div>

</body>
</html>
