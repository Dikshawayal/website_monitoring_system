{% extends 'base.html' %}

{% block page_title %}Password Changed{% endblock %}

{% block content %}

<div class="row justify-content-center mt-2">
    <div class="col-md-8 col-lg-6">
        <div class="card-chart text-center">
            <div class="card-header-custom">
                <h5><i class="bi bi-check-circle me-2 text-success"></i>Password Changed</h5>
            </div>
            <div style="padding: 40px 24px;">
                <div class="mb-4">
                    <i class="bi bi-shield-check text-success" style="font-size: 64px;"></i>
                </div>
                <h4 class="mb-2">Success!</h4>
                <p class="text-muted mb-4">Your password has been changed successfully.</p>
                <a href="{% url 'account' %}" class="btn btn-primary">
                    <i class="bi bi-arrow-left me-1"></i> Back to Account
                </a>
            </div>
        </div>
    </div>
</div>

{% endblock %}
